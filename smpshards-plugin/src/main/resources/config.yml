# Leaderboard GUI
leaderboard:
  title: Shard Leaderboard
  size: 54 # Must be multiple of 9 (9, 18, 27, 36, 45, 54)
  entries-per-page: 45
  # Slot layout: which slots show player entries (0-indexed)
  entry-slots:
    - 10
    - 11
    - 12
    - 13
    - 14
    - 15
    - 16
    - 19
    - 20
    - 21
    - 22
    - 23
    - 24
    - 25
    - 28
    - 29
    - 30
    - 31
    - 32
    - 33
    - 34
    - 37
    - 38
    - 39
    - 40
    - 41
    - 42
    - 43
  # Items
  filler:
    enabled: false
    material: BLACK_STAINED_GLASS_PANE
    name: ' '
  border:
    material: GRAY_STAINED_GLASS_PANE
    name: ' '
  prev-page:
    slot: 48
    material: ARROW
    name: '&7в—Ђ Previous Page'
  next-page:
    slot: 50
    material: ARROW
    name: '&7Next Page в–¶'
  close:
    slot: 49
    material: BARRIER
    name: '&cClose'
  info:
    slot: 4
    material: NETHER_STAR
    name: '&d&lShard Leaderboard'
    lore:
      - '&7The most dedicated shard farmers!'
      - ''
      - '&7Page &e{page}&7/&e{max_page}'
      - '&7Total entries: &e{total}'
  # Player skull item in leaderboard
  player-entry:
    # {rank}, {player}, {shards} are available placeholders
    name: '&e#{rank} &f{player}'
    lore:
      - '&7Shards: &6{shards}'
  # Top 3 special colors
  rank-colors:
    '1': '&6&l'
    '2': '&7&l'
    '3': '&c&l'
    default: '&e'

# Particle Effects
particles:
  shard-received:
    enabled: true
    type: VILLAGER_HAPPY
    count: 10
  enter-area:
    enabled: true
    type: SPELL_WITCH
    count: 20

# Sound Effects
sounds:
  shard-received:
    enabled: true
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.8
    pitch: 1.2
  enter-area:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 1.0
    pitch: 1.0
  leave-area:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 1.0
    pitch: 0.8