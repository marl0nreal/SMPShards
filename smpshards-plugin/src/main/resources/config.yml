# ============================================================
#                    SMPShards Configuration
#                      Made by marlonreal
# ============================================================

# Which database backend to use.
# Allowed values (case-insensitive):
#   mysql  в†’ remote MySQL / MariaDB server  (see mysql block below)
#   h2     в†’ embedded H2 file DB            (no extra config needed)
#   sqlite в†’ embedded SQLite file DB        (no extra config needed)
storage-type: h2

# MySQL Database
mysql:
  host: localhost
  port: 3306
  database: smpshards
  username: root
  password: password
  use-ssl: false
  table-prefix: shards_
  pool-size: 10
  connection-timeout: 30000

# Area Settings
area:
  # World the area is in (must match exactly)
  world: world
  # Coordinates set via /shard setpos1 & setpos2
  pos1:
    x: 0.0
    y: 0.0
    z: 0.0
  pos2:
    x: 0.0
    y: 0.0
    z: 0.0

# Shard Rewards
rewards:
  # Seconds between each shard reward
  interval: 60
  # How many shards to give per interval
  amount: 1
  # Bonus shards (random extra) - set both to 0 to disable
  bonus-min: 0
  bonus-max: 0

# ActionBar Settings
actionbar:
  # Shown while player is inside the area
  inside: '&aвњ¦ &7Next shard in &e{countdown}s &7| &d&l{shards} Shards'
  # Shown when leaving the area
  leave: '&cвњ¦ &7You left the Shard Area!'
  # Update interval in ticks (20 ticks = 1 second)
  update-ticks: 20

# Messages
messages:
  prefix: '&8[&5Shards&8] &r'
  shard-received: '&d+{amount} &7Shard(s)! &7(Total: &d{total}&7)'
  bonus-received: '&d+{bonus} &7Bonus Shard(s)! рџЋ‰'
  entered-area: '&aWelcome to the &dShard Farm&a! Stay here to earn shards.'
  left-area: '&cYou left the &dShard Farm&c.'
  no-area-set: '&cNo area set. Use /shard setpos1 & setpos2.'
  pos1-set: '&aPos1 set: &e{x}, {y}, {z}'
  pos2-set: '&aPos2 set: &e{x}, {y}, {z}'
  no-block-in-sight: '&cNo block in sight (max. 10 blocks)!'
  invalid-amount: '&cInvalid amount!'
  usage-give: '&cUsage: /{label} give <player> <amount>'
  usage-reset: '&cUsage: /{label} reset <player>'
  reload-success: '&aPlugin successfully reloaded!'
  no-permission: '&cYou don''t have permission to do that!'
  player-only: '&cThis command is for players only!'
  player-not-found: '&cPlayer not found!'
